<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — LyricLingo</title>
  <meta name="description" content="Get in touch with the LyricLingo team." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/contact.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="/">LYRIC LINGO</a>
      <div class="nav-links" role="navigation" aria-label="Main navigation">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/features.html">Features</a>
        <a class="nav-link nav-link--active" href="/contact.html">Contact us</a>
      </div>
      <div class="nav-end">
        <a class="nav-cta" href="/">Try now</a>
      </div>
    </div>
  </nav>

  <main class="cp-main">

    <!-- ── Page hero ── -->
    <div class="cp-hero">
      <div class="hero-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
        We'd love to hear from you
      </div>
      <h1 class="cp-headline">Get in <span class="hero-headline-accent">Touch</span></h1>
      <p class="cp-sub">Have a question, suggestion, or just want to say hello? Send us a message.</p>
    </div>

    <!-- ── Contact layout ── -->
    <div class="cp-layout">

      <!-- Left: info -->
      <aside class="cp-info">
        <div class="cp-info-card">
          <div class="cp-info-item">
            <div class="cp-info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div>
              <div class="cp-info-label">Email us</div>
              <a href="mailto:hello@lyriclingo.com" class="cp-info-value">hello@lyriclingo.com</a>
            </div>
          </div>

          <div class="cp-info-item">
            <div class="cp-info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div>
              <div class="cp-info-label">Response time</div>
              <div class="cp-info-value">Within 24 hours</div>
            </div>
          </div>

          <div class="cp-info-item">
            <div class="cp-info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <div>
              <div class="cp-info-label">Feedback & ideas</div>
              <div class="cp-info-value">Always welcome</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right: form -->
      <div class="cp-form-wrap">
        <form id="contact-form" class="cp-form" novalidate>

          <div class="cf-row">
            <div class="cf-field">
              <label class="cf-label" for="cf-name">Name</label>
              <input
                class="cf-input"
                type="text"
                id="cf-name"
                name="name"
                placeholder="Your name"
                autocomplete="name"
                required
              />
            </div>
            <div class="cf-field">
              <label class="cf-label" for="cf-email">Email</label>
              <input
                class="cf-input"
                type="email"
                id="cf-email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="cf-field">
            <label class="cf-label" for="cf-subject">Subject</label>
            <select class="cf-input cf-select" id="cf-subject" name="subject">
              <option value="general">General question</option>
              <option value="feedback">Feedback / suggestion</option>
              <option value="bug">Bug report</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="cf-field">
            <label class="cf-label" for="cf-message">Message</label>
            <textarea
              class="cf-input cf-textarea"
              id="cf-message"
              name="message"
              placeholder="Tell us what's on your mind…"
              rows="5"
              required
            ></textarea>
          </div>

          <div class="cf-footer">
            <button type="submit" class="cf-submit" id="cf-submit-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              Send Message
            </button>
          </div>

          <!-- States -->
          <div id="cf-error" class="cf-state cf-state--error" style="display:none"></div>
          <div id="cf-success" class="cf-state cf-state--success" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Message sent! We'll get back to you soon.
          </div>

        </form>
      </div>

    </div>
  </main>

  <script src="/contact.js"></script>
</body>
</html>
